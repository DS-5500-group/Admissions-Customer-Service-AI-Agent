name: Automated Docker FIle Push

on:
  push:
    branches:
      - main 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Examine the Repository in the Github
      uses: actions/checkout@v3

    - name: Login into the Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Modifying the Docker in the Artifact Registry in Google Cloud
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Docker Image Build
      run: |
        docker build -t us-central1-docker.pkg.dev/ds5500-487815/test-repo/updateddockerfile:${GITHUB_SHA} \
                     -t us-central1-docker.pkg.dev/ds5500-487815/test-repo/updateddockerfile:latest \
                     ./src

    - name: Pushing the Docker Image into GCP
      run: |
        docker push us-central1-docker.pkg.dev/ds5500-487815/test-repo/updateddockerfile:${GITHUB_SHA}
        docker push us-central1-docker.pkg.dev/ds5500-487815/test-repo/updateddockerfile:latest
