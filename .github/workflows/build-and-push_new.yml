name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'

env:
  REGION: us-central1
  REPO_NAME: test-repo          
  IMAGE_NAME: agent 
  SERVICE_NAME: agent   
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build image with Cloud Build
        run: |
          gcloud builds submit \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ secrets.PROJ_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ./src

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ secrets.PROJ_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ secrets.PROJ_ID }} \
            --allow-unauthenticated \
            --timeout=3600 \
            --set-env-vars "BASE_URL=${{ secrets.BASE_URL }},OPENAI_API_KEY=${{ secrets.OPEN_AI_NP }},RESEND_API_KEY=${{ secrets.RESEND }}"
